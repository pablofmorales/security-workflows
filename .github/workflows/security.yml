name: Security

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      package-manager:
        description: "Package manager (npm, yarn, pnpm)"
        required: false
        type: string
        default: "npm"
      audit-level:
        description: "npm audit severity threshold (low, moderate, high, critical)"
        required: false
        type: string
        default: "high"
      skip-gitleaks:
        description: "Skip secret leak scanning"
        required: false
        type: boolean
        default: false
      skip-audit:
        description: "Skip npm audit"
        required: false
        type: boolean
        default: false
    secrets:
      DISCORD_SECURITY_WEBHOOK:
        description: "Discord webhook URL for security alerts"
        required: false

jobs:
  supply-chain:
    name: Supply Chain Protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Socket Firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f
        with:
          mode: firewall-free

      - name: Install dependencies (npm)
        if: inputs.package-manager == 'npm'
        run: sfw npm ci

      - name: Install dependencies (yarn)
        if: inputs.package-manager == 'yarn'
        run: sfw yarn install --frozen-lockfile

      - name: Install dependencies (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: |
          npm i -g pnpm
          sfw pnpm install --frozen-lockfile

      - name: Discord alert on failure
        if: failure() && secrets.DISCORD_SECURITY_WEBHOOK != ''
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_SECURITY_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Supply Chain Alert\",
              \"description\": \"Socket Firewall detected a problem in **${REPO}**\",
              \"color\": 15548997,
              \"fields\": [
                {\"name\": \"Branch\", \"value\": \"\`${BRANCH}\`\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"\`${ACTOR}\`\", \"inline\": true},
                {\"name\": \"Run\", \"value\": \"[View logs](${RUN_URL})\", \"inline\": true}
              ],
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$WEBHOOK_URL"

  audit:
    name: Dependency Audit
    if: ${{ !inputs.skip-audit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: npm audit --audit-level=${{ inputs.audit-level }} 2>&1 | tee /tmp/audit-output.txt

      - name: Discord alert on failure
        if: failure() && secrets.DISCORD_SECURITY_WEBHOOK != ''
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_SECURITY_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SUMMARY=$(tail -20 /tmp/audit-output.txt | head -5 | tr '\n' ' ' | sed 's/"/\\"/g')
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Dependency Vulnerability Alert\",
              \"description\": \"npm audit found vulnerabilities in **${REPO}**\",
              \"color\": 15105570,
              \"fields\": [
                {\"name\": \"Summary\", \"value\": \"\`\`\`${SUMMARY}\`\`\`\", \"inline\": false},
                {\"name\": \"Branch\", \"value\": \"\`${BRANCH}\`\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"\`${ACTOR}\`\", \"inline\": true},
                {\"name\": \"Run\", \"value\": \"[View logs](${RUN_URL})\", \"inline\": true}
              ],
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$WEBHOOK_URL"

  secrets:
    name: Secret Leak Detection
    if: ${{ !inputs.skip-gitleaks }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Discord alert on failure
        if: failure() && secrets.DISCORD_SECURITY_WEBHOOK != ''
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_SECURITY_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Secret Leak Detected\",
              \"description\": \"Gitleaks found exposed secrets in **${REPO}**\",
              \"color\": 15418782,
              \"fields\": [
                {\"name\": \"Branch\", \"value\": \"\`${BRANCH}\`\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"\`${ACTOR}\`\", \"inline\": true},
                {\"name\": \"Run\", \"value\": \"[View logs](${RUN_URL})\", \"inline\": true}
              ],
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$WEBHOOK_URL"
